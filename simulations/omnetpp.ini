[General]
network = DNP3NetworkTopology
sim-time-limit = 350s

output-scalar-file = ${configname}.sca
output-vector-file = ${configname}.vec

**.scalar-recording = true
**.vector-recording = true
**.result-recording-modes = all

*.distAuto.processingDelay = 10ms
**.totalPackets = 500
**.ackTimeout = 2s
**.stopGenerationTime = 300s
*.meter[*].meterId = index


[Config VeryLightTraffic_50]
description = "Very light traffic with 50 smart meters"
*.numMeters = 50
*.distAuto.numMeters = 50
**.eventInterval = 20s
**.eventBytes = 442


[Config LightTraffic]
description = "Light traffic scenario"
*.numMeters = 50
*.distAuto.numMeters = 50
**.eventInterval = 10s
**.eventBytes = 442


[Config MediumTraffic_50]
description = "Medium traffic with 50 smart meters"
*.numMeters = 50
*.distAuto.numMeters = 50
**.eventInterval = 5s
**.eventBytes = 442


[Config HeavyTraffic]
description = "Heavy traffic scenario"
*.numMeters = 50
*.distAuto.numMeters = 50
**.eventInterval = 1s
**.eventBytes = 542


[Config VeryHeavyTraffic_50]
description = "Very heavy traffic with 50 smart meters"
*.numMeters = 50
*.distAuto.numMeters = 50
**.eventInterval = 0.5s
