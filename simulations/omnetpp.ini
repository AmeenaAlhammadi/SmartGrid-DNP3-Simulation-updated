[Config RandomTraffic_25]
description = "Randomized traffic with 25 smart meters"
*.numMeters = 25
*.distAuto.numMeters = 25
**.eventInterval = exponential(5s)
**.eventBytes = intuniform(442, 542)
seed-set = ${runnumber}
repeat = 50
output-scalar-file = results/RandomTraffic_25-${runnumber}.sca
output-vector-file = results/RandomTraffic_25-${runnumber}.vec


