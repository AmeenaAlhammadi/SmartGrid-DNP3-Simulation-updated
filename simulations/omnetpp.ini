[General]
network = DNP3NetworkTopology
sim-time-limit = 200s

# Save result files
output-scalar-file = ${configname}.sca
output-vector-file = ${configname}.vec

# Record results
**.scalar-recording = true
**.vector-recording = true
**.result-recording-modes = all

# Common settings
*.distAuto.processingDelay = 10ms
**.totalPackets = 200
**.ackTimeout = 2s
*.meter[*].meterId = index


[Config LightTraffic]
description = "Light traffic scenario"
*.numMeters = 50
*.distAuto.numMeters = 50
**.eventInterval = 10s
**.eventBytes = 442


[Config HeavyTraffic]
description = "Heavy burst traffic scenario"
*.numMeters = 50
*.distAuto.numMeters = 50
**.eventInterval = 1s
**.eventBytes = 542